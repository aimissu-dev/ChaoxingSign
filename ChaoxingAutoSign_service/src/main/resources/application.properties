spring.application.name=ChaoxingAutoSign

# Server
server.port=18080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/chaoxing_autosigns?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# JWT
jwt.secret=ChaoxingAutoSign2024SecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# Logging
logging.level.chaoxing.autosign=ERROR
logging.level.org.springframework.data.redis=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=WARN
