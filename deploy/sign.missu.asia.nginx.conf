server
{
    listen 80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    listen [::]:80;
    server_name sign.missu.asia;
    index index.html index.htm;
    root /www/wwwroot/sign.missu.asia/dist;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/sign.missu.asia.conf;
    #CERT-APPLY-CHECK--END

    include /www/server/panel/vhost/nginx/extension/sign.missu.asia/*.conf;

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END

    ssl_certificate    /www/server/panel/vhost/cert/sign.missu.asia/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/sign.missu.asia/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    # ACME 验证目录
    location ~ \.well-known {
        allow all;
    }

    # API 反向代理到 Spring Boot
    location /api/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Vue SPA 静态文件 —— 必须保留 / 在最下面匹配
    location / {
        try_files $uri $uri/ /index.html;
    }


    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    access_log  /dev/null;
    error_log  /www/wwwlogs/sign.missu.asia.error.log;
}
